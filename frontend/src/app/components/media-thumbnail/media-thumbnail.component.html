<div 
    (click)="goToMediaDetails(media.id)"
    [style.height.px]="height" 
    [style.width.px]="width" 
    [style.left.px]="widthShift"
    [style.top.px]="heightShift"
    [style.background-color]="'lightgray'">
    <img [src]="media.filePath" [ngStyle]="{visibility:isLoading?'hidden':'',height:height+'px'}" (load)="hideLoader()" (error)="hideLoader()"/>
</div>
