<div class="media-wrapper" *ngIf="media">
    <button class="closeMediaBtn" (click)="closeMedia()">X</button>
    <div class="media" *ngIf="media">
        <img [src]="media.filePath" />
    </div>

    <div class="mediaInfo">
        <p>
            {{ media | json }}
        </p>
    </div>
</div>
